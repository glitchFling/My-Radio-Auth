name: Build & Commit WASM

on:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install wabt
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Compile hash.wat
        run: wat2wasm src/hash.wat -o src/hash.wasm

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/hash.wasm
          echo "WASM rebuild: $(date --utc +%Y-%m-%dT%H:%M:%SZ)" > .wasm-timestamp
          git add .wasm-timestamp || true
          git commit -m "ci: rebuild hash.wasm [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed; add repo secret GIT_PUSH_TOKEN with repo write PAT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hash-wasm
          path: src/hash.wasm

