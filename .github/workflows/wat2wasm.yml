name: Build & Commit WASM

on:
  push:
    paths:
      - 'src/hash.wat'
      - 'wat2wasm.config.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wabt
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Compile hash.wat (dynamic)
        run: |
          COMPILE_CMD=$(node -e "console.log(require('./wat2wasm.config.js').CompileCMD)")
          eval $COMPILE_CMD

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hash-wasm
          path: src/hash.wasm

      - name: Commit WASM (no timestamp)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/hash.wasm

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: rebuild hash.wasm [skip ci]"
            git push
          fi

      # - name: Deploy to Cloudflare (optional)
      #   env:
      #     CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
      #   run: npx wrangler deploy
