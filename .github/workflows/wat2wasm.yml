name: Build WAT → WASM & Deploy

on:
  push:
    branches:
      - "**"

jobs:
  build-wasm:
    # Skip running this job when the commit was made by the GitHub Actions bot
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      # Make the secret available to steps as an env var (may be empty)
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install WABT (wat2wasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: Validate config file
        run: |
          if [ -f src/wat2wasm.config.js ]; then
            node -e "const cfg = require('./src/wat2wasm.config.js'); if(!cfg || !cfg.CompileCMD) { console.error('Missing CompileCMD in src/wat2wasm.config.js'); process.exit(1); } console.log('Using CompileCMD from config:', cfg.CompileCMD);"
          else
            echo "No config file found at src/wat2wasm.config.js; falling back to default compile loop."
          fi

      - name: Compile src/*.wat → src/*.wasm (config-aware)
        run: |
          set -euo pipefail

          if [ -f src/wat2wasm.config.js ]; then
            node -e "
              const cfg = require('./src/wat2wasm.config.js');
              const { execSync } = require('child_process');
              console.log('Running:', cfg.CompileCMD);
              execSync(cfg.CompileCMD, { stdio: 'inherit' });
            "
          else
            sh -c 'for f in src/*.wat; do out=\"${f%.wat}.wasm\"; echo \"Compiling $f → $out\"; wat2wasm \"$f\" -o \"$out\"; done'
          fi

      - name: Show generated WASM files
        run: |
          ls -la src/*.wasm || echo "No wasm files generated"

      - name: Commit WASM artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/*.wasm || true

          if ! git diff --cached --quiet; then
            git commit -m "Auto-compile WAT → WASM [ci skip]" || true
            # Push back to the same branch
            git push origin HEAD:"${GITHUB_REF#refs/heads/}" || true
          else
            echo "No changes to commit."
          fi
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Publish to Cloudflare (only if token present)
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN not set; skipping Cloudflare publish."
            exit 0
          fi

          npm install -g wrangler@2
          # Publish; wrangler will use your wrangler.toml and the compiled wasm at src/hash.wasm
          wrangler publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
