name: Build WAT → WASM & Deploy (always commit)

on:
  push:
    branches:
      - "**"

# Allow the workflow to push changes back to the repository
permissions:
  contents: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  build-wasm:
    # Prevent infinite loop by not running when the actor is the bot that will push commits
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Debug repository state
        run: |
          echo "PWD: $(pwd)"
          echo "Branch: ${GITHUB_REF#refs/heads/}"
          echo "Actor: $GITHUB_ACTOR"
          git status --porcelain || true
          echo "Root listing:"
          ls -la || true
          echo "src listing:"
          ls -la src || true
          echo "Find .wat files:"
          find src -type f -name '*.wat' -print || true

      - name: Install WABT (wat2wasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: Compile .wat → .wasm recursively
        run: |
          set -euo pipefail
          mapfile -t WAT_FILES < <(find src -type f -name '*.wat' -print || true)
          if [ ${#WAT_FILES[@]} -eq 0 ]; then
            echo "No .wat files found under src/; skipping compilation."
          else
            for f in "${WAT_FILES[@]}"; do
              out="${f%.wat}.wasm"
              echo "Compiling $f → $out"
              wat2wasm "$f" -o "$out"
            done
          fi

      - name: Validate generated WASM
        run: |
          set -euo pipefail
          mapfile -t WASM_FILES < <(find src -type f -name '*.wasm' -print || true)
          if [ ${#WASM_FILES[@]} -eq 0 ]; then
            echo "No .wasm files generated."
          else
            echo "Generated .wasm files:"
            for w in "${WASM_FILES[@]}"; do
              ls -la "$w"
            done
          fi

      - name: Prepare artifact directory (if any wasm)
        id: find_wasm
        run: |
          set -euo pipefail
          mkdir -p artifacts
          mapfile -t WASM_FILES < <(find src -type f -name '*.wasm' -print || true)
          if [ ${#WASM_FILES[@]} -eq 0 ]; then
            echo "has_wasm=false" >> $GITHUB_OUTPUT
          else
            for f in "${WASM_FILES[@]}"; do
              mkdir -p "artifacts/$(dirname "$f")"
              cp -- "$f" "artifacts/$f"
            done
            echo "has_wasm=true" >> $GITHUB_OUTPUT
            echo "artifact_path=artifacts" >> $GITHUB_OUTPUT
            echo "wasm_count=${#WASM_FILES[@]}" >> $GITHUB_OUTPUT
          fi

      - name: Upload WASM artifacts
        if: steps.find_wasm.outputs.has_wasm == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: ${{ steps.find_wasm.outputs.artifact_path }}

      - name: Commit WASM artifacts on every run (marker file)
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          # Find wasm files (for logging and optional staging)
          mapfile -t WASM_FILES < <(find src -type f -name '*.wasm' -print || true)
          echo "Found ${#WASM_FILES[@]} wasm files."

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update a marker file so there is always a change to commit
          MARKER=".wasm-build-timestamp"
          echo "$(date --utc +%Y-%m-%dT%H:%M:%SZ)" > "$MARKER"
          git add -- "$MARKER"

          # Stage wasm files if present
          if [ ${#WASM_FILES[@]} -ne 0 ]; then
            for f in "${WASM_FILES[@]}"; do
              git add -- "$f"
            done
          fi

          # Commit: this will always create a commit because the marker changed
          git commit -m "Auto-compile WAT → WASM [ci skip] $(date --utc +%Y-%m-%dT%H:%M:%SZ)" || true

          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Pushing compiled artifacts to branch: $BRANCH"
          git push origin "HEAD:$BRANCH" || {
            echo "git push failed; this may be due to branch protection or token permissions."
            echo "If branch protection blocks GITHUB_TOKEN, consider allowing Actions to bypass protection or use a PAT."
            exit 0
          }

      # Optional: fallback using a PAT if branch protection blocks GITHUB_TOKEN
      # To enable: create a secret GIT_PUSH_TOKEN with a PAT that has repo scope,
      # then uncomment the step below and comment out the previous commit/push step.
      #
      # - name: Commit and push using PAT (fallback)
      #   env:
      #     GIT_PUSH_TOKEN: ${{ secrets.GIT_PUSH_TOKEN }}
      #     GITHUB_REF: ${{ github.ref }}
      #   run: |
      #     set -euo pipefail
      #     mapfile -t WASM_FILES < <(find src -type f -name '*.wasm' -print || true)
      #     git config user.name "github-actions[bot]"
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      #     MARKER=".wasm-build-timestamp"
      #     echo "$(date --utc +%Y-%m-%dT%H:%M:%SZ)" > "$MARKER"
      #     git add -- "$MARKER"
      #     if [ ${#WASM_FILES[@]} -ne 0 ]; then
      #       for f in "${WASM_FILES[@]}"; do
      #         git add -- "$f"
      #       done
      #     fi
      #     git commit -m "Auto-compile WAT → WASM [ci skip] $(date --utc +%Y-%m-%dT%H:%M:%SZ)" || true
      #     BRANCH="${GITHUB_REF#refs/heads/}"
      #     git remote set-url origin "https://x-access-token:${GIT_PUSH_TOKEN}@github.com/${{ github.repository }}.git"
      #     git push origin "HEAD:$BRANCH" || {
      #       echo "git push with PAT failed"
      #       exit 0
      #     }

      - name: Publish to Cloudflare if token present
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN not set; skipping publish."
            exit 0
          fi
          echo "Installing wrangler..."
          npm install -g wrangler@2
          echo "Publishing to Cloudflare Workers..."
          wrangler publish
