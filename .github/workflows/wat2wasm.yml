name: Build WAT → WASM & Deploy

on:
  push:
    branches:
      - "**"

jobs:
  build-wasm:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug repository state
        run: |
          echo "PWD: $(pwd)"
          echo "Branch: ${GITHUB_REF#refs/heads/}"
          echo "Actor: $GITHUB_ACTOR"
          git status --porcelain || true
          echo "Root listing:"
          ls -la || true
          echo "src listing:"
          ls -la src || true
          echo "Find .wat files:"
          find src -type f -name '*.wat' -print || true

      - name: Install WABT (wat2wasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: Compile .wat → .wasm recursively
        run: |
          set -euo pipefail
          mapfile -t WAT_FILES < <(find src -type f -name '*.wat' -print)
          if [ ${#WAT_FILES[@]} -eq 0 ]; then
            echo "No .wat files found under src/; skipping compilation."
            exit 0
          fi
          for f in "${WAT_FILES[@]}"; do
            out="${f%.wat}.wasm"
            echo "Compiling $f → $out"
            wat2wasm "$f" -o "$out"
          done

      - name: Show generated WASM
        run: |
          find src -type f -name '*.wasm' -print -exec ls -la {} \; || echo "No wasm files"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: |
            src/**/*.wasm

      - name: Commit WASM artifacts if changed
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/**/*.wasm || true
          if ! git diff --cached --quiet; then
            git commit -m "Auto-compile WAT → WASM [ci skip]" || true
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "Pushing compiled artifacts to branch: $BRANCH"
            git push origin "HEAD:$BRANCH" || echo "git push failed"
          else
            echo "No changes to commit."
          fi

      - name: Publish to Cloudflare if token present
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN not set; skipping publish."
            exit 0
          fi
          npm install -g wrangler@2
          wrangler publish
