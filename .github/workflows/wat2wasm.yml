name: Build WAT → WASM & Deploy

on:
  push:
    branches:
      - "**"

# Allow the workflow to push changes back to the repository
permissions:
  contents: write

env:
  # Cloudflare token (may be empty)
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  build-wasm:
    # Avoid retriggering on bot commits
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Debug repository state
        run: |
          echo "PWD: $(pwd)"
          echo "Branch: ${GITHUB_REF#refs/heads/}"
          echo "Actor: $GITHUB_ACTOR"
          git status --porcelain || true
          echo "Root listing:"
          ls -la || true
          echo "src listing:"
          ls -la src || true
          echo "Find .wat files:"
          find src -type f -name '*.wat' -print || true

      - name: Install WABT (wat2wasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: Compile .wat → .wasm recursively
        run: |
          set -euo pipefail
          mapfile -t WAT_FILES < <(find src -type f -name '*.wat' -print)
          if [ ${#WAT_FILES[@]} -eq 0 ]; then
            echo "No .wat files found under src/; skipping compilation."
            exit 0
          fi
          for f in "${WAT_FILES[@]}"; do
            out="${f%.wat}.wasm"
            echo "Compiling $f → $out"
            wat2wasm "$f" -o "$out"
          done

      - name: Validate generated WASM
        run: |
          set -euo pipefail
          mapfile -t WASM_FILES < <(find src -type f -name '*.wasm' -print)
          if [ ${#WASM_FILES[@]} -eq 0 ]; then
            echo "No .wasm files generated."
          else
            echo "Generated .wasm files:"
            for w in "${WASM_FILES[@]}"; do
              ls -la "$w"
            done
          fi

      - name: Prepare artifact directory (if any wasm)
        id: find_wasm
        run: |
          set -euo pipefail
          mkdir -p artifacts
          mapfile -t WASM_FILES < <(find src -type f -name '*.wasm' -print)
          if [ ${#WASM_FILES[@]} -eq 0 ]; then
            echo "has_wasm=false" >> $GITHUB_OUTPUT
          else
            # Copy files preserving directory structure so artifacts are organized
            for f in "${WASM_FILES[@]}"; do
              mkdir -p "artifacts/$(dirname "$f")"
              cp -- "$f" "artifacts/$f"
            done
            echo "has_wasm=true" >> $GITHUB_OUTPUT
            echo "artifact_path=artifacts" >> $GITHUB_OUTPUT
            echo "wasm_count=${#WASM_FILES[@]}" >> $GITHUB_OUTPUT
          fi

      - name: Upload WASM artifacts
        if: steps.find_wasm.outputs.has_wasm == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: ${{ steps.find_wasm.outputs.artifact_path }}

      - name: Commit WASM artifacts if changed
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          # Find wasm files again
          mapfile -t WASM_FILES < <(find src -type f -name '*.wasm' -print)

          if [ ${#WASM_FILES[@]} -eq 0 ]; then
            echo "No .wasm files to commit; skipping commit step."
            exit 0
          fi

          echo "Found ${#WASM_FILES[@]} wasm files to consider for commit:"
          for f in "${WASM_FILES[@]}"; do
            echo " - $f"
            sha1sum "$f" || true
          done

          echo "=== Diff vs HEAD for wasm files ==="
          git --no-pager diff --name-only HEAD -- "${WASM_FILES[@]}" || true
          git --no-pager diff -- "${WASM_FILES[@]}" || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the found files (handles spaces safely)
          for f in "${WASM_FILES[@]}"; do
            git add -- "$f"
          done

          # Commit and push only if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-compile WAT → WASM [ci skip]" || true
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "Pushing compiled artifacts to branch: $BRANCH"
            git push origin "HEAD:$BRANCH" || {
              echo "git push failed; this may be due to branch protection. Consider using a PAT or allowing Actions to bypass protection."
            }
          else
            echo "No changes to commit."
          fi

      - name: Publish to Cloudflare if token present
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN not set; skipping publish."
            exit 0
          fi
          echo "Installing wrangler..."
          npm install -g wrangler@2
          echo "Publishing to Cloudflare Workers..."
          wrangler publish
