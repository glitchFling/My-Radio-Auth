name: Build WAT → WASM & Always Commit

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  build-wasm:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Debug repo state
        run: |
          set -euo pipefail
          echo "Actor: $GITHUB_ACTOR"
          echo "Branch: ${GITHUB_REF#refs/heads/}"
          git status --porcelain || true
          echo "Tracked wasm files:"
          git ls-files -- src/**/*.wasm || true
          echo "Find .wat files:"
          find src -type f -name '*.wat' -print || true
          echo "Find .wasm files:"
          find src -type f -name '*.wasm' -print || true

      - name: Install WABT (wat2wasm)
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: Compile .wat → .wasm recursively
        run: |
          set -euo pipefail
          mapfile -t WAT_FILES < <(find src -type f -name '*.wat' -print || true)
          if [ ${#WAT_FILES[@]} -eq 0 ]; then
            echo "No .wat files found; skipping compilation."
          else
            for f in "${WAT_FILES[@]}"; do
              out="${f%.wat}.wasm"
              echo "Compiling $f → $out"
              wat2wasm "$f" -o "$out"
            done
          fi

      - name: Validate generated WASM
        run: |
          set -euo pipefail
          mapfile -t WASM_FILES < <(find src -type f -name '*.wasm' -print || true)
          if [ ${#WASM_FILES[@]} -eq 0 ]; then
            echo "No .wasm files generated."
          else
            echo "Generated .wasm files:"
            for w in "${WASM_FILES[@]}"; do
              ls -la "$w"
              sha1sum "$w" || true
            done
          fi

      - name: Prepare artifact directory
        id: find_wasm
        run: |
          set -euo pipefail
          mkdir -p artifacts
          mapfile -t WASM_FILES < <(find src -type f -name '*.wasm' -print || true)
          if [ ${#WASM_FILES[@]} -eq 0 ]; then
            echo "has_wasm=false" >> $GITHUB_OUTPUT
          else
            for f in "${WASM_FILES[@]}"; do
              mkdir -p "artifacts/$(dirname "$f")"
              cp -- "$f" "artifacts/$f"
            done
            echo "has_wasm=true" >> $GITHUB_OUTPUT
            echo "artifact_path=artifacts" >> $GITHUB_OUTPUT
            echo "wasm_count=${#WASM_FILES[@]}" >> $GITHUB_OUTPUT
          fi

      - name: Upload WASM artifacts
        if: steps.find_wasm.outputs.has_wasm == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: ${{ steps.find_wasm.outputs.artifact_path }}

